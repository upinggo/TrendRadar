name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with image extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[image]"

      - name: Import smoke test
        run: |
          python -c "import trendradar; print('trendradar OK', getattr(trendradar, '__version__', '?'))"
          python -c "import mcp_server; print('mcp_server OK')"
          python -c "from trendradar.notification import senders, dispatcher, treemap_image; print('notification OK')"

      - name: Syntax check
        run: python -m compileall -q trendradar mcp_server
